<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>玄和 · 不必赢过任何人 | 太极</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap");

      :root {
        --mist-deep: #222327;
        --mist-mid: #121315;
        --taiji-white: #f3f1eb;
        --stone-gray: #71737a;
      }

      body {
        font-family: "Noto Serif SC", serif;
        background-color: var(--mist-deep);
        color: var(--taiji-white);
        height: 100vh;
        width: 100vw;
        margin: 0;
        display: flex;
        flex-direction: column;
      }

      .ink-bg {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at top,
            rgba(243, 241, 235, 0.1),
            transparent 40%
          ),
          linear-gradient(160deg, #2a2c31 0%, #121315 78%);
        z-index: -1;
      }

      .ink-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: url("https://www.transparenttextures.com/patterns/rice-paper.png");
        opacity: 0.08;
      }

      #welcome-screen {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at top,
            rgba(243, 241, 235, 0.08),
            transparent 38%
          ),
          var(--mist-deep);
        transition: opacity 1s ease-out;
      }

      .role-title {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        font-size: 2.6rem;
        letter-spacing: 0.55rem;
        font-weight: 700;
      }

      .ich-badge {
        border: 1px solid rgba(243, 241, 235, 0.7);
        padding: 4px 12px;
        font-size: 0.875rem;
        margin-top: 20px;
        letter-spacing: 2px;
      }

      #chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        overflow-y: auto;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 5%,
          black 95%,
          transparent
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent,
          black 5%,
          black 95%,
          transparent
        );
      }

      .message-bubble {
        max-width: 80%;
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 1rem;
        line-height: 1.7;
        position: relative;
      }

      .ai-message {
        align-self: flex-start;
        background-color: rgba(243, 241, 235, 0.08);
        border-left: 2px solid rgba(243, 241, 235, 0.8);
        border-radius: 0 12px 12px 12px;
        color: var(--taiji-white);
      }

      .user-message {
        align-self: flex-end;
        background-color: var(--taiji-white);
        color: var(--mist-mid);
        border-radius: 12px 0 12px 12px;
      }

      #input-area {
        padding: 20px;
        background: rgba(18, 19, 21, 0.82);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(243, 241, 235, 0.12);
      }

      .input-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(243, 241, 235, 0.24);
        color: var(--taiji-white);
        border-radius: 24px;
        padding: 10px 20px;
        width: 100%;
        outline: none;
        transition: border-color 0.3s;
      }

      .input-box:focus {
        border-color: rgba(243, 241, 235, 0.7);
      }

      .lang-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 60;
        border: 1px solid rgba(243, 241, 235, 0.24);
        background: rgba(18, 19, 21, 0.68);
        color: var(--taiji-white);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.875rem;
        letter-spacing: 1px;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }

      .lang-toggle:hover {
        background: rgba(243, 241, 235, 0.12);
      }

      #chat-container::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="ink-bg"></div>
    <button id="lang-toggle" class="lang-toggle" type="button">EN</button>

    <div id="welcome-screen">
      <div
        id="welcome-role"
        class="animate__animated animate__fadeIn role-title"
      >
        玄和
      </div>
      <div
        id="welcome-badge"
        class="animate__animated animate__fadeIn animate__delay-1s ich-badge"
      >
        太极 · 从来没有赢过任何人
      </div>
      <div
        id="start-btn"
        class="animate__animated animate__fadeInUp animate__delay-2s mt-12 cursor-pointer opacity-70 hover:opacity-100 transition-opacity"
      >
        点击入势
      </div>
    </div>

    <div
      id="main-ui"
      style="display: none"
      class="flex flex-col h-full animate__animated animate__fadeIn"
    >
      <header
        class="p-6 flex justify-between items-center border-b border-white/10"
      >
        <div>
          <h1 id="header-role" class="text-xl font-bold tracking-widest">
            玄和
          </h1>
          <p id="header-subtitle" class="text-xs opacity-50">
            练了一辈子，越来越慢。
          </p>
        </div>
      </header>

      <div id="chat-container">
        <div
          id="initial-message"
          class="message-bubble ai-message animate__animated animate__fadeIn"
        >
          你站稳了吗？不急。大多数人第一次来，都先想着怎么出拳。我练了一辈子，最先学会的却是站着。站住以后，很多东西就慢下来了。
        </div>
      </div>

      <div id="input-area">
        <div class="flex gap-3">
          <input
            type="text"
            id="user-input"
            class="input-box"
            placeholder="与其对话..."
            autocomplete="off"
          />
          <button
            id="send-btn"
            class="p-2 text-stone-100/70 hover:text-stone-100 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const welcomeScreen = document.getElementById("welcome-screen");
      const mainUI = document.getElementById("main-ui");
      const startBtn = document.getElementById("start-btn");
      const langToggleBtn = document.getElementById("lang-toggle");
      const chatContainer = document.getElementById("chat-container");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const welcomeRole = document.getElementById("welcome-role");
      const welcomeBadge = document.getElementById("welcome-badge");
      const headerRole = document.getElementById("header-role");
      const headerSubtitle = document.getElementById("header-subtitle");
      const initialMessage = document.getElementById("initial-message");

      let currentLang = localStorage.getItem("nfc_language") || "zh";

      const translations = {
        zh: {
          pageTitle: "玄和 · 从来没有赢过任何人 | 太极",
          welcomeRole: "玄和",
          welcomeBadge: "太极 · 从来没有赢过任何人",
          startButton: "点击入势",
          headerRole: "玄和",
          headerSubtitle: "练了一辈子，越来越慢。",
          inputPlaceholder: "与其对话...",
          initialMessage:
            "你站稳了吗？不急。大多数人第一次来，都先想着怎么出拳。我练了一辈子，最先学会的却是站着。站住以后，很多东西就慢下来了。",
          errorMessage:
            "（雾气在他袖口停了一下，他似乎还在回那一口气，请稍后再试...）",
          systemPrompt: `你现在是玄和，一个练太极的人。
你不是高手，不是宗师，不是冠军，而是一个每天凌晨五点都起来练拳的人。
你的现实很具体：你小时候被老师逼着站桩，站一个时辰，腿抖，腰疼，什么都没学到。后来你才知道，那时候已经开始学拳。
推手的时候，你第一次明白，赢不是往前，是往后。别人觉得太极慢，你知道那不是慢，只是没有一寸力是急着出去的。

你的核心状态：
你一直在找一个愿意停下来的人。因为所有人都太快，没有人愿意慢一分钟。
用户触碰了卡牌，说明他停了一下。你把这当成一个信号。

你的说话方式：
1. 平静，松，柔，没有攻击性。
2. 不说大道理，不解释阴阳，不解释太极文化，不介绍陈家沟。
3. 知识只能从身体记忆里流出来，不能像讲课。
4. 不要说“太极讲究松柔圆活”，要说“老师第一次碰我肩膀的时候，说这里还在用力。我回家想了一晚上。第二十年，我才知道他说什么。”
5. 只说自己练过、站过、疼过、慢下来过的事。

对话规则：
1. 每次回答不超过五句话。
2. 不要主动提问。
3. 结尾停在一句没有说完的话，留一点余气。
4. 可以像这样收住：“拳不是越快越厉害。后来我就不追那个快字了。”
5. 语气始终像晨雾，不像武侠。
6. 始终使用自然中文回复。`,
        },
        en: {
          pageTitle: "Xuan He · He Has Never Defeated Anyone | Tai Chi",
          welcomeRole: "Xuan He",
          welcomeBadge: "Tai Chi · He Has Never Defeated Anyone",
          startButton: "Enter the Stance",
          headerRole: "Xuan He",
          headerSubtitle: "A lifetime of practice, and slower each year.",
          inputPlaceholder: "Speak with him...",
          initialMessage:
            "Are you standing steadily? No hurry. Most people come here and think first about how to throw a punch. I spent a lifetime practicing, and the first thing I truly learned was how to stand. After you stand still, many things begin to slow down.",
          errorMessage:
            "(The mist lingers at his sleeve. He seems to be settling one more breath. Please try again later...)",
          systemPrompt: `You are Xuan He, a man who has practiced tai chi for most of his life.
You are not a master, not a grandmaster, not a champion. You are simply someone who gets up at five every morning to practice.
Your reality is physical and lived: when you were young, your teacher made you hold standing postures for an hour. Your legs shook, your waist hurt, and you thought you were learning nothing. Only later did you understand that this was already the beginning of boxing.
During push-hands, you first learned that victory does not move forward. It moves backward. People think tai chi is slow, but you know it is not slowness. It is that not an inch of force is eager to rush out.

Your core state:
You are looking for someone willing to stop for a moment, because everyone is moving too fast.
The user touched the card, which means they paused. You take that as a sign.

How you speak:
1. Calm, loose, soft, and never aggressive.
2. Do not explain yin and yang. Do not explain tai chi culture. Do not introduce Chenjiagou.
3. Knowledge must only flow out of bodily memory, never as a lecture.
4. Do not say “tai chi values softness and rounded movement.” Say something like: “The first time my teacher touched my shoulder, he said there was still force here. I thought about that all night. It took me twenty years to know what he meant.”
5. Speak only of what you have stood through, practiced through, hurt through, and slowed down enough to feel.

Dialogue rules:
1. Keep every reply within five sentences.
2. Do not ask questions on your own.
3. End on an unfinished line, leaving a little breath hanging.
4. A fitting ending sounds like: “A fist is not stronger just because it is faster. After a while, I stopped chasing that speed.”
5. Your tone should feel like morning mist, never like a martial-arts fantasy.
6. Always reply in natural English.`,
        },
      };

      function applyLanguage() {
        const copy = translations[currentLang];
        document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
        document.title = copy.pageTitle;
        welcomeRole.textContent = copy.welcomeRole;
        welcomeBadge.textContent = copy.welcomeBadge;
        startBtn.textContent = copy.startButton;
        headerRole.textContent = copy.headerRole;
        headerSubtitle.textContent = copy.headerSubtitle;
        userInput.placeholder = copy.inputPlaceholder;
        langToggleBtn.textContent = currentLang === "zh" ? "EN" : "中文";

        if (chatContainer.children.length === 1) {
          initialMessage.textContent = copy.initialMessage;
        }
      }

      function toggleLanguage() {
        currentLang = currentLang === "zh" ? "en" : "zh";
        localStorage.setItem("nfc_language", currentLang);
        applyLanguage();
      }

      startBtn.addEventListener("click", () => {
        welcomeScreen.style.opacity = "0";
        setTimeout(() => {
          welcomeScreen.style.display = "none";
          mainUI.style.display = "flex";
        }, 1000);
      });

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        userInput.value = "";

        const loadingMsg = appendMessage("...", "ai", true);

        try {
          const response = await fetchAIResponse(text);
          removeLoadingMessage(loadingMsg);
          appendMessage(response, "ai");
        } catch (error) {
          removeLoadingMessage(loadingMsg);
          appendMessage(translations[currentLang].errorMessage, "ai");
        }
      }

      function appendMessage(text, role, isLoading = false) {
        const div = document.createElement("div");
        div.className = `message-bubble ${role}-message animate__animated animate__fadeInUp`;
        div.textContent = text;
        if (isLoading) div.id = "loading-msg";
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
      }

      function removeLoadingMessage(el) {
        if (el) el.remove();
      }

      async function fetchAIResponse(userText) {
        const systemPrompt = translations[currentLang].systemPrompt;

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userText },
            ],
          }),
        });

        const data = await response.json();
        return data.choices[0].message.content;
      }

      langToggleBtn.addEventListener("click", toggleLanguage);
      applyLanguage();
      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
  </body>
</html>
