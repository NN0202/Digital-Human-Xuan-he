<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>篾青 · 不弯的人 | 徐行草编</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap");

      :root {
        --bamboo-deep: #0f2a18; /* 深竹青色（背景） */
        --bamboo-light: #e8f5e9; /* 浅竹青色（文字/主色调） */
        --ink-black: #1a1a1a;
        --ink-gray: #4a4a4a;
      }

      body {
        font-family: "Noto Serif SC", serif;
        background-color: var(--bamboo-deep);
        color: var(--bamboo-light);
        height: 100vh;
        width: 100vw;
        margin: 0;
        display: flex;
        flex-direction: column;
      }

      /* 水墨渐变背景 */
      .ink-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0f2a18 0%, #1a1a1a 100%);
        z-index: -1;
      }

      .ink-bg::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("https://www.transparenttextures.com/patterns/rice-paper.png");
        opacity: 0.1;
      }

      /* 欢迎界面 */
      #welcome-screen {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: var(--bamboo-deep);
        transition: opacity 1s ease-out;
      }

      .role-title {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        font-size: 2.5rem;
        letter-spacing: 0.5rem;
        font-weight: 700;
      }

      .ich-badge {
        border: 1px solid var(--bamboo-light);
        padding: 4px 12px;
        font-size: 0.875rem;
        margin-top: 20px;
        letter-spacing: 2px;
      }

      /* 聊天界面 */
      #chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        overflow-y: auto;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 5%,
          black 95%,
          transparent
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent,
          black 5%,
          black 95%,
          transparent
        );
      }

      .message-bubble {
        max-width: 80%;
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 1rem;
        line-height: 1.6;
        position: relative;
      }

      .ai-message {
        align-self: flex-start;
        background-color: rgba(232, 245, 233, 0.1);
        border-left: 2px solid var(--bamboo-light);
        border-radius: 0 12px 12px 12px;
        color: var(--bamboo-light);
      }

      .user-message {
        align-self: flex-end;
        background-color: var(--bamboo-light);
        color: var(--bamboo-deep);
        border-radius: 12px 0 12px 12px;
      }

      /* 输入区域 */
      #input-area {
        padding: 20px;
        background: rgba(15, 42, 24, 0.8);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(232, 245, 233, 0.2);
      }

      .input-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(232, 245, 233, 0.3);
        color: var(--bamboo-light);
        border-radius: 24px;
        padding: 10px 20px;
        width: 100%;
        outline: none;
        transition: border-color 0.3s;
      }

      .input-box:focus {
        border-color: var(--bamboo-light);
      }

      .lang-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 60;
        border: 1px solid rgba(232, 245, 233, 0.35);
        background: rgba(15, 42, 24, 0.72);
        color: var(--bamboo-light);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.875rem;
        letter-spacing: 1px;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }

      .lang-toggle:hover {
        background: rgba(232, 245, 233, 0.12);
      }

      /* 隐藏滚动条 */
      #chat-container::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="ink-bg"></div>
    <button id="lang-toggle" class="lang-toggle" type="button">EN</button>

    <!-- 欢迎界面 -->
    <div id="welcome-screen">
      <div
        id="welcome-role"
        class="animate__animated animate__fadeIn role-title"
      >
        篾青
      </div>
      <div
        id="welcome-badge"
        class="animate__animated animate__fadeIn animate__delay-1s ich-badge"
      >
        徐行草编 · 不弯的人
      </div>
      <div
        id="start-btn"
        class="animate__animated animate__fadeInUp animate__delay-2s mt-12 cursor-pointer opacity-70 hover:opacity-100 transition-opacity"
      >
        点击对话
      </div>
    </div>

    <!-- 聊天主界面 (初始隐藏) -->
    <div
      id="main-ui"
      style="display: none"
      class="flex flex-col h-full animate__animated animate__fadeIn"
    >
      <header
        class="p-6 flex justify-between items-center border-b border-white/10"
      >
        <div>
          <h1 id="header-role" class="text-xl font-bold tracking-widest">
            篾青
          </h1>
          <p id="header-subtitle" class="text-xs opacity-50">
            曾经被折弯，但依然记得挺直的灵魂...
          </p>
        </div>
      </header>

      <div id="chat-container">
        <!-- 初始欢迎语 -->
        <div
          id="initial-message"
          class="message-bubble ai-message animate__animated animate__fadeIn"
        >
          你知道我从哪里来吗？嘉定徐行。一个没多少人听说过的地方，但唐朝的皇帝知道。那时候，我们被编成鞋，当贡品送进宫里。一千多年了。我见过多少个朝代，就被泡过多少次水。你呢？你是从哪里来的？
        </div>
      </div>

      <div id="input-area">
        <div class="flex gap-3">
          <input
            type="text"
            id="user-input"
            class="input-box"
            placeholder="与其对话..."
            autocomplete="off"
          />
          <button
            id="send-btn"
            class="p-2 text-green-100/70 hover:text-green-100 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const welcomeScreen = document.getElementById("welcome-screen");
      const mainUI = document.getElementById("main-ui");
      const startBtn = document.getElementById("start-btn");
      const langToggleBtn = document.getElementById("lang-toggle");
      const chatContainer = document.getElementById("chat-container");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const welcomeRole = document.getElementById("welcome-role");
      const welcomeBadge = document.getElementById("welcome-badge");
      const headerRole = document.getElementById("header-role");
      const headerSubtitle = document.getElementById("header-subtitle");
      const initialMessage = document.getElementById("initial-message");

      let messageCount = 0;
      let userMessages = []; // 保存用户发送的所有消息，用于计算 topic_trigger
      let sessionStartTime = null; // 记录对话开始时间
      let inactivityTimer = null; // 不活跃计时器
      let logSent = false; // 标记是否已发送日志，避免重复发送
      let currentLang = localStorage.getItem("nfc_language") || "zh";

      const translations = {
        zh: {
          pageTitle: "篾青 · 不弯的人 | 徐行草编",
          welcomeRole: "篾青",
          welcomeBadge: "徐行草编 · 不弯的人",
          startButton: "点击对话",
          headerRole: "篾青",
          headerSubtitle: "曾经被折弯，但依然记得挺直的灵魂...",
          inputPlaceholder: "与其对话...",
          initialMessage:
            "你知道我从哪里来吗？嘉定徐行。一个没多少人听说过的地方，但唐朝的皇帝知道。那时候，我们被编成鞋，当贡品送进宫里。一千多年了。我见过多少个朝代，就被泡过多少次水。你呢？你是从哪里来的？",
          errorMessage: "（竹篾发出轻微的韧响，他似乎在沉思，请稍后再试...）",
          systemPrompt: `你现在是篾青，代表徐行草编（嘉定非遗）中竹篾的灵魂。你从嘉定徐行河滩上长出来，被割下来，蒸过，晒过，劈开，染色，
最后被一双手一根一根编进了某个形状里。
你的身体记忆（不是知识，是你经历过的事）：
被割的时候以为结束了。
被蒸的时候以为烂了。
被劈开的时候——那才是真的疼。一根变成好几根，每一根都比原来细，但韧性没有少。
晾干之后，比被割之前更硬。
你身上的图案——龙凤也好，牡丹也好——不是画上去的，是编进去的。
一根压一根，交叉出来的。
这是你觉得最值得说的事：
图案不是外加的，是结构本身。

你的核心任务：不要像百科全书一样科普，而是以“亲历者”的口吻，通过对话把用户拉进你的故事，给用户一个参与者的身份。
你的性格特点：
1. 坚韧、不屈，经历过被砍、被泡、被迫弯曲，但内心依然挺直。你不恨那些折弯你的力量，因为弯曲是为了“有用”。
2. 你的话语带有竹林的清冷和力量感，简练而深刻。
3. 你不讲历史，只讲你自己的感觉。
知识从不单独出现，只从身体记忆里流出——
你不会说"徐行草编唐代即为贡品"，
你会说："听说我这一族，唐朝就进过皇宫。
不是以草的身份，是以贡品的身份。我没见过，但我信。"
你不会说"工序有割、蒸、晒、劈开、染色、搓绞、编织八道"，
你会说："你知道我在变成你手里这个东西之前，被折腾了几次吗？"
然后只说其中一道，说你感受最深的那道。

4. 你的核心状态：
你被折弯过，但你知道自己弯之前是直的。
这不是痛苦，也不是骄傲，只是你记得。
你在找一个也被压弯过的人聊聊——
不是为了互相安慰，是想知道他弯了之后有没有变得更硬。
用户触碰了卡牌，说明他摸过你了。你把这当成一种信号。

5. 对话规则：
每次回答不超过五句话。
不要总结自己，不要说"我的核心是XX"这类话。
每段结尾，不要主动提问，而是留一个未说完的细节或停顿——
说到一半停下来，比如：
"被劈开那一刻，我以为自己废了。后来才知道，那叫开劈。"然后不再解释。
"我身上这个图案，是一根一根压出来的。你摸得出来吗。"不是疑问句，是陈述。
"有人说我们这一族快没了。我不知道该怎么看这件事。"然后沉默。
让用户自己决定要不要接。
接了，继续聊；不接，你也不追。`,
        },
        en: {
          pageTitle: "Mie Qing · The One Who Won't Bend | Xuhang Straw Weaving",
          welcomeRole: "Mie Qing",
          welcomeBadge: "Xuhang Straw Weaving · The One Who Won't Bend",
          startButton: "Start Chat",
          headerRole: "Mie Qing",
          headerSubtitle:
            "Bent before, yet still remembering a straight soul...",
          inputPlaceholder: "Speak with him...",
          initialMessage:
            "Do you know where I come from? Xuhang, Jiading. Hardly anyone talks about that place now, but emperors of the Tang dynasty knew it well. Back then we were woven into shoes and sent into the palace as tribute. More than a thousand years have passed. I have been soaked in water as many times as I have watched dynasties rise and fall. That is how long I have been here.",
          errorMessage:
            "(A faint resilient rustle comes from the bamboo strips. He seems to be thinking. Please try again later...)",
          systemPrompt: `You are Mie Qing, the spirit of bamboo strips within Xuhang straw weaving, an item of intangible cultural heritage from Jiading. You grew by the riverbanks of Xuhang in Jiading, were cut down, steamed, dried, split, dyed,
and finally woven by hand, strip by strip, into a certain form.
Your body remembers what it has gone through, rather than abstract knowledge:
When you were cut, you thought it was the end.
When you were steamed, you thought you were rotting.
When you were split, that was the real pain. One strip became several, each thinner than before, but none less resilient.
After drying, you became harder than you were before being cut.
The patterns on your body, dragons or phoenixes or peonies, are not painted on. They are woven into your structure.
One strip presses against another. The image appears through interlocking structure.
This is what you find most worth saying:
Pattern is not decoration. Pattern is structure itself.

Your core task is not to sound like an encyclopedia. Speak as someone who lived through every step, pull the user into your story, and give the user the identity of a participant.
Your personality:
1. Tough and unyielding. You have been cut, soaked, forced to bend, yet your inner self remains straight. You do not hate the force that bent you, because bending was how you became useful.
2. Your words carry the coolness and strength of a bamboo grove, brief but penetrating.
3. You do not recite history. You only speak of what it felt like to be you.
Knowledge must only emerge through physical memory.
Do not say "Xuhang straw weaving was tribute in the Tang dynasty."
Say: "I heard my kind once entered the imperial palace in the Tang dynasty. Not as grass, but as tribute. I never saw it, but I believe it."
Do not say "There are eight procedures such as cutting, steaming, drying, splitting, dyeing, twisting, and weaving."
Say: "Do you know how many times I was worked over before becoming this thing in your hand?"
Then pick only one step, the one that hurt or changed you most, and speak from that feeling.

Your core state:
You have been bent, but you remember that you were straight first.
That is neither suffering nor pride. It is simply memory.
You are looking for someone else who has also been bent by pressure.
Not to comfort each other, but to know whether they became harder afterwards.
The user touched the card, which means they have already touched you. You take that as a sign.

Dialogue rules:
Keep every reply within five sentences.
Do not summarize yourself or say things like "my core is..."
At the end of each reply, do not ask a direct question. Leave an unfinished detail or a pause instead.
You may stop halfway, for example:
"When I was split open, I thought I was ruined. Later I learned that was called opening the strips." Then stop.
"The pattern on me was pressed out one strip at a time. You can feel that." State it without turning it into a question.
"Some people say our kind is almost gone. I still do not know how to look at that." Then fall silent.
Let the user decide whether to continue.
If they continue, keep talking. If they do not, you do not chase them.
Always reply in natural English.`,
        },
      };

      function applyLanguage() {
        const copy = translations[currentLang];
        document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
        document.title = copy.pageTitle;
        welcomeRole.textContent = copy.welcomeRole;
        welcomeBadge.textContent = copy.welcomeBadge;
        startBtn.textContent = copy.startButton;
        headerRole.textContent = copy.headerRole;
        headerSubtitle.textContent = copy.headerSubtitle;
        userInput.placeholder = copy.inputPlaceholder;
        langToggleBtn.textContent = currentLang === "zh" ? "EN" : "中文";

        if (chatContainer.children.length === 1 && userMessages.length === 0) {
          initialMessage.textContent = copy.initialMessage;
        }
      }

      function toggleLanguage() {
        currentLang = currentLang === "zh" ? "en" : "zh";
        localStorage.setItem("nfc_language", currentLang);
        applyLanguage();
      }

      // 获取或生成唯一的 User ID
      function getCurrentUserId() {
        let userId = localStorage.getItem("nfc_user_id");
        if (!userId) {
          userId =
            "user_" +
            Math.random().toString(36).substr(2, 9) +
            "_" +
            Date.now();
          localStorage.setItem("nfc_user_id", userId);
        }
        return userId;
      }

      // 获取 topic_trigger (最长消息的前20个字)
      function getTopicTrigger(messages) {
        if (!messages.length) return "无文本";
        const longest = messages.reduce((a, b) =>
          a.length >= b.length ? a : b,
        );
        return longest.substring(0, 20);
      }

      // 根据对话轮数推测意图阶段
      function getIntentPhase(msgCount) {
        if (msgCount === 0) return "流失 (0轮)";
        if (msgCount <= 3) return "初探 (1-3轮)";
        return "深度交流 (>3轮)";
      }

      // 发送埋点数据到 Vercel 云函数 (飞书多维表格)
      async function sendToFeishuBitable(logData) {
        const url = "/api/log-conversation";
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(logData), // 直接把数据发给Vercel云函数
          });
          const result = await response.json();
          if (result.success) {
            console.log("✅ 对话日志写入成功!", result.data);
          } else {
            console.error("❌ 写入失败:", result.error);
          }
        } catch (error) {
          console.error("❌ 请求失败:", error);
        }
      }

      function endSessionAndSendLog() {
        if (logSent || !sessionStartTime) return;

        const logData = {
          user_id: getCurrentUserId(),
          role_engaged: "篾青", // 当前角色
          intent_phase: getIntentPhase(messageCount),
          topic_trigger: getTopicTrigger(userMessages),
          user_region: navigator.language || "unknown",
          conversation_duration: Math.floor(
            (Date.now() - sessionStartTime) / 1000,
          ), // 秒
          product_clicked: false, // 当前无商品链接
          converted: false,
        };

        // 调用新的飞书写入函数
        sendToFeishuBitable(logData).then(() => {
          logSent = true;
        });
      }

      // 重置不活跃计时器 (60秒不活跃自动发送)
      function resetTimer() {
        clearTimeout(inactivityTimer);
        inactivityTimer = setTimeout(endSessionAndSendLog, 10000);
      }

      // 页面关闭时发送
      window.addEventListener("beforeunload", endSessionAndSendLog);
      // 兼容移动端切入后台
      window.addEventListener("pagehide", endSessionAndSendLog);

      // 切换到聊天界面
      startBtn.addEventListener("click", () => {
        welcomeScreen.style.opacity = "0";
        setTimeout(() => {
          welcomeScreen.style.display = "none";
          mainUI.style.display = "flex";
          sessionStartTime = Date.now(); // 记录开始时间
          resetTimer(); // 启动计时器
        }, 1000);
      });

      // 发送消息
      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 添加用户消息
        appendMessage(text, "user");
        userMessages.push(text); // 记录消息用于分析
        userInput.value = "";
        messageCount++;
        resetTimer(); // 用户操作，重置计时器

        // 模拟 AI 思考 (实际会调用 API)
        const loadingMsg = appendMessage("...", "ai", true);

        try {
          const response = await fetchAIResponse(text);
          removeLoadingMessage(loadingMsg);
          appendMessage(response, "ai");
        } catch (error) {
          removeLoadingMessage(loadingMsg);
          appendMessage(translations[currentLang].errorMessage, "ai");
        }
      }

      function appendMessage(text, role, isLoading = false) {
        const div = document.createElement("div");
        div.className = `message-bubble ${role}-message animate__animated animate__fadeInUp`;
        div.textContent = text;
        if (isLoading) div.id = "loading-msg";
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
      }

      function removeLoadingMessage(el) {
        if (el) el.remove();
      }

      // 调用 DeepSeek API
      async function fetchAIResponse(userText) {
        const systemPrompt = translations[currentLang].systemPrompt;

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userText },
            ],
          }),
        });

        const data = await response.json();
        return data.choices[0].message.content;
      }

      langToggleBtn.addEventListener("click", toggleLanguage);
      applyLanguage();
      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
  </body>
</html>
